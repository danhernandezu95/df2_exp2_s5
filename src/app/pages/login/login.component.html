<div class="container mt-4"><div class="card"><div class="card-header"><h3>Iniciar Sesión</h3></div><div class="card-body"><form [formGroup]="loginForm" (ngSubmit)="login()"><div class="mb-3"><label>Usuario</label><input formControlName="usuario" class="form-control"></div><div class="mb-3"><label>Contraseña</label><input formControlName="password" type="password" class="form-control"></div><div class="d-flex gap-2"><button class="btn btn-primary" type="submit">Ingresar</button><button class="btn btn-secondary" type="button" (click)="limpiarFormulario()">Limpiar</button></div></form></div></div></div>
